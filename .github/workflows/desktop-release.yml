name: Build Desktop Releases

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux
            os: ubuntu-22.04
            bundle_args: --bundles appimage,deb,rpm
          - name: windows
            os: windows-latest
            bundle_args: --bundles msi,nsis
          - name: macos
            os: macos-latest
            bundle_args: --bundles dmg,app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri desktop app
        run: npm run build:tauri -- ${{ matrix.platform.bundle_args }}

      - name: Normalize Linux artifact names
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          APPIMAGE_PATH="$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -n 1)"
          cp "$APPIMAGE_PATH" dist/pufferblow-client-linux-x86_64.AppImage
          for file in src-tauri/target/release/bundle/deb/*.deb; do
            [ -e "$file" ] && cp "$file" dist/
          done
          for file in src-tauri/target/release/bundle/rpm/*.rpm; do
            [ -e "$file" ] && cp "$file" dist/
          done

      - name: Normalize Windows artifact names
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $msi = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          Copy-Item $msi.FullName "dist/pufferblow-client-windows-x64.msi"
          $nsis = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -ne $nsis) {
            Copy-Item $nsis.FullName "dist/pufferblow-client-windows-x64-setup.exe"
          }

      - name: Normalize macOS artifact names
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          DMG_PATH="$(ls src-tauri/target/release/bundle/dmg/*.dmg | head -n 1)"
          cp "$DMG_PATH" dist/pufferblow-client-macos-universal.dmg
          for file in src-tauri/target/release/bundle/macos/*.app.tar.gz; do
            [ -e "$file" ] && cp "$file" dist/
          done

      - name: Upload desktop installers to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload desktop bundles as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform.name }}
          path: dist
          if-no-files-found: error
