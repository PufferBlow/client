name: Build Desktop Releases

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux
            os: ubuntu-22.04
            build_cmd: desktop:build:linux
          - name: windows
            os: windows-latest
            build_cmd: desktop:build:windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libfuse2

      - name: Install dependencies
        run: npm ci

      - name: Build desktop app
        run: npm run ${{ matrix.platform.build_cmd }}

      - name: Collect Linux artifacts
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          find release -maxdepth 2 \( -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" \) \
            -exec cp {} dist/ \;

      - name: Collect Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Get-ChildItem -Path release -Recurse -Include "*.exe", "*.msi" |
            Copy-Item -Destination dist/

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform.name }}
          path: dist
          if-no-files-found: error
